<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../Images/logo_fynex_no_bg _.ico" type="image/x-icon">
    <link rel="stylesheet" href="../Css/bemVindo.css">
    <title>Fynex Home</title>
</head>
<body>
    <div class="particula p1"></div>
    <div class="particula p2"></div>
    <div class="particula p3"></div>
    <div class="particula p4"></div>


    <div class="hello">
        <div class="menuburguer">
            &#9776;
        </div>
        <div class="helloTexto">
            <h1 class="helloMsg">Olá, Utilizador</h1>
            <h3 class="helloMsg2">Como está ?</h3>
        </div>
        <img src="../Images/logo_fynex_no_bg _.ico" alt="perfil" class="perfil">
    </div>

    
    <div class="painel">
        <h1>Geral</h1>

        <div class="progress">
            <div class="robar">
                <span class="progressValue">40%</span>
            </div>
        </div>
    </div>


    <div class="recentes">
        <h1>Atividades recentes</h1>
    </div>

    <div class="detalhes"></div>

    <div class="ActionBtn">
        <h1>+</h1>
    </div>

    <div class="SideMenu">
        <br><br>
        <button class="MenuBtn">Início</button>
        <button class="MenuBtn">Objetivos</button>
        <button class="MenuBtn">Definições</button>
        <button class="SairBtn">Sair</button>
    </div>

    <div class="FloatMenu">
        <button class="PlusBtn">Adicionar Saldo</button>
        <button class="PlusBtn">Registar Gasto</button>
        <button class="PlusBtn">Criar Nova Meta</button>
        <button class="PlusBtn">Adicionar Valor à Meta</button>
    </div>

</body>
</html>
