<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Fynex Home</title>
    <link rel="shortcut icon" href="../Images/logo_fynex_no_bg _.ico" type="image/x-icon">
    <link rel="stylesheet" href="../Css/bemVindo.css">
</head>


<body>
    <!-- Div para definir detalhes da pagina-->
    <div class="detalhes"></div>

    <!-- Particulas-->
    <div class="particula p1"></div>
    <div class="particula p2"></div>
    <div class="particula p3"></div>
    <div class="particula p4"></div>


    <!-- Main Menu/Cabeçalho-->
    <div class="MainMenu">
        <!-- Menu Hamburguer-->
        <div class="menuburguer">&#9776;</div>

        <!-- Saudações-->
        <div class="MainMenuTexto">

            <h1 id="Greetings">          Olá, Utilizador </h1>
            <h3 id="GreetingsSecund">    Como está ?     </h3>
         
        </div>

        <!-- Profile Pic-->
        <img src="../Images/logo_fynex_no_bg _.ico" alt="perfil" id="perfil">
    </div>

    
    <!-- Painel Principal-->
    <div class="painel">
        <!-- Titulo-->
        <h1>Geral</h1>


    </div>


    <!-- Atividades Recentes-->
    <div class="recentes">
        <!-- Titulo-->
        <h1>Atividades recentes</h1>


    </div>


    <!-- Botão de Ações Rapidas-->
    <div class="ActionBtn">
        <!-- To Close (-) To Open (+)-->
        <h1 id="OpenClose"></h1>


    </div>


    <!-- Menu DropDown (Definições)-->
    <div class="SideMenu">
        <!-- Espaçamento entre o topo da div (escondido) e as opções-->
        <br><br> 

        <!-- Opções-->
        <button id="Home" class="MenuBtn">    Início      </button>
        <button id="Gols" class="MenuBtn">    Objetivos   </button>
        <button id="Conf" class="MenuBtn">    Definições  </button>
        <button id="Exit" class="SairBtn">    Sair        </button>
    </div>


    <!-- Float Menu (Botão Verde)-->
    <div class="FloatMenu"> 
        <!-- Ações-->
        <button id="Saldo" class="PlusBtn">     Adicionar Saldo         </button>
        <button id="Gasto" class="PlusBtn">     Registar Gasto          </button>
        <button id="Metas" class="PlusBtn">     Criar Nova Meta         </button>
        <button id="Valor" class="PlusBtn">     Adicionar Valor à Meta  </button>
    </div>


    <!-- Codigo JS-->
</script>
</body>
</html>
