<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fynex Login</title>
    <link rel="shortcut icon" href="../Images/logo_fynex_no_bg _.ico" type="image/x-icon">
    <link rel="stylesheet" href="../Css/login.css">
</head>

<body>
    <!-- Particulas-->
    <div class="particula p1"></div>
    <div class="particula p2"></div>
    <div class="particula p3"></div>
    <div class="particula p4"></div>

    <!-- Mensagem-->
    <div id="mensagem">
        <h1><strong>Entrar</strong></h1>
    </div>

    <!-- Down Shape-->
        <img id="stickerA" src="../Images/Shape Set_a.svg" alt="DownSticker">
    <!-- Up Shape-->
        <img id="stickerB" src="../Images/Shape Set_b.svg" alt="UpSticker">
    <!-- Fynex-->
        <img id="stickerC" src="../Images/logo_fynex_no_bg _.png" alt="FynexLogoSticker">

    <!-- Inputs-->
    <div id="Inputs">
        <input  id="email"    class="input"  type="email"     placeholder="Email">
        <input  id="password" class="input"  type="password"  placeholder="Palavra-passe">

        <br><button onclick="Login()">Entrar</button>
    </div>

    <!--Link Politica-->
    <div id="politica">
        <h3>Ao prosseguir, você concorda com os nossos <u><a href="Politica.html">Termos de serviço e Política de Privacidade</a></u></h3>
    </div>

    <script type="module" src="../JavaScript/Contas/Login.js"></script>
</body>
</html>
